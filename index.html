<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1c14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Smart Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SAVER SCREEN 0 — Clock + Weather
  ════════════════════════════════════════════════ -->
  <div id="screensaver" class="screen active">

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- Cart button — top right -->
    <button id="btn-cart-0" class="saver-btn saver-btn-cart saver-cart-top" aria-label="Shopping list">🛒</button>

    <!-- Lang · Theme -->
    <div class="saver-controls">
      <button id="btn-lang-saver" class="saver-btn" aria-label="Switch language">BS</button>
      <button id="btn-theme"      class="saver-btn" aria-label="Switch theme">☀️</button>
    </div>

    <div class="screensaver-content">

      <div class="clock-block">
        <div id="clock-time" class="clock-time">00:00</div>
        <div id="clock-seconds" class="clock-seconds">00</div>
        <div id="clock-date" class="clock-date">Monday, January 1</div>
      </div>

      <div class="weather-block">
        <div class="weather-current">
          <span id="weather-icon" class="weather-icon">—</span>
          <div class="weather-temp-block">
            <span id="weather-temp" class="weather-temp">--°</span>
            <span id="weather-desc" class="weather-desc">Loading…</span>
            <span id="weather-hilo" class="weather-hilo">H: --° · L: --°</span>
          </div>
        </div>

        <div id="weather-forecast" class="weather-forecast"></div>

        <div id="weather-error" class="weather-error hidden">
          Weather unavailable
        </div>
      </div>

    </div>

    <div id="tap-hint" class="tap-hint">Swipe for news</div>

    <div class="saver-dots">
      <div class="dot dot-active"></div>
      <div class="dot"></div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       SAVER SCREEN 1 — News Feed
  ════════════════════════════════════════════════ -->
  <div id="news" class="screen">

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="news-header">
      <div class="news-header-row">
        <div id="news-updated" class="news-updated"></div>
        <button id="btn-cart-1" class="saver-btn saver-btn-cart" aria-label="Shopping list">🛒</button>
      </div>
    </div>

    <div id="news-feed" class="news-feed">
      <div class="news-loading">Loading news…</div>
    </div>

    <div class="saver-dots">
      <div class="dot"></div>
      <div class="dot dot-active"></div>
    </div>

    <!-- Article detail popup (scoped inside #news so it fades with the screen) -->
    <div id="news-popup" class="news-popup hidden">
      <div id="news-popup-backdrop" class="news-popup-backdrop"></div>
      <div class="news-popup-card">
        <button id="news-popup-close" class="news-popup-close" aria-label="Close">✕</button>
        <div id="news-popup-source" class="news-popup-source"></div>
        <div id="news-popup-title"  class="news-popup-title"></div>
        <div id="news-popup-time"   class="news-popup-time"></div>
        <a   id="news-popup-link"   class="news-popup-link" target="_blank" rel="noopener noreferrer">
          Read full article →
        </a>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════
       SHOPPING LIST MODE
  ════════════════════════════════════════════════ -->
  <div id="shopping" class="screen">

    <div class="shopping-header">
      <div class="shopping-title-row">
        <span class="shopping-icon">🛒</span>
        <h1 id="shopping-title" class="shopping-title">Shopping List</h1>
        <button id="btn-lang"        class="btn-header-icon" aria-label="Switch language">BS</button>
        <button id="btn-screensaver" class="btn-screensaver" aria-label="Return to screensaver">🌙</button>
      </div>
      <div id="shopping-meta" class="shopping-meta">Loading…</div>
    </div>

    <div id="add-form" class="add-form hidden">
      <input id="add-input" class="add-input" type="text"
             placeholder="Add item…" autocomplete="off" autocorrect="off" autocapitalize="sentences" />
      <button id="btn-add-confirm" class="btn-form-action btn-form-confirm" aria-label="Add">✓</button>
      <button id="btn-add-cancel"  class="btn-form-action btn-form-cancel"  aria-label="Cancel">✕</button>
    </div>

    <div id="shopping-list" class="shopping-list"></div>

    <div id="shopping-empty" class="shopping-empty hidden">
      <div class="empty-icon">✓</div>
      <div id="empty-text" class="empty-text">All done!</div>
    </div>

    <div id="shopping-error" class="shopping-error hidden">
      <div class="error-icon">!</div>
      <div id="shopping-error-text" class="error-text">Could not load list</div>
    </div>

    <button id="btn-add" class="btn-add" aria-label="Add item">+</button>

    <div id="selection-bar" class="selection-bar hidden">
      <button id="btn-cancel-sel" class="sel-btn sel-cancel">Cancel</button>
      <span   id="sel-count"      class="sel-count">0 selected</span>
      <button id="btn-delete-sel" class="sel-btn sel-delete" disabled>Delete</button>
      <button id="btn-clear-all"  class="sel-btn sel-danger">Clear All</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
